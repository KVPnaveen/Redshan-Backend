spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/redshan360}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true

server.port=${PORT:8080}

# Hikari Connection Pool settings (dynamic scaling defaults)
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:5}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}

# Spring Task Execution thread pool settings
spring.task.execution.pool.core-size=${SPRING_TASK_EXECUTION_POOL_CORE_SIZE:8}
spring.task.execution.pool.max-size=${SPRING_TASK_EXECUTION_POOL_MAX_SIZE:64}
spring.task.execution.pool.queue-capacity=${SPRING_TASK_EXECUTION_POOL_QUEUE_CAPACITY:10000}
spring.task.execution.pool.keep-alive=${SPRING_TASK_EXECUTION_POOL_KEEP_ALIVE:60s}

# CORS configuration
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

# PayHere Integration Settings
payhere.merchant-id=${PAYHERE_MERCHANT_ID:1236591}
payhere.secret-key=${PAYHERE_SECRET_KEY:NDE2NTgwODM2MTEwOTQ3Mzk3MDUyNjc0MTU2NzA0MzgzNDcwMTE3MA==}